<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>

    </ul>
    <button class="btn">변경</button>
    
    <script>
       const items = document.querySelectorAll('li');
       items.forEach((item) => {
        item.style.color = 'blue';
       });
    
    
    </script>
</body>
</html>
